<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Pure black rounded square background -->
  <rect width="100" height="100" rx="10" ry="10" fill="#000000"/>
  <!-- Outer white border frame (thin) -->
  <rect x="5" y="5" width="90" height="90" rx="6" ry="6" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- 作家 characters in white, light weight -->
  <text
    x="50"
    y="67"
    text-anchor="middle"
    font-family="'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif"
    font-size="44"
    font-weight="300"
    fill="white"
    letter-spacing="-1"
  >作家</text>
</svg>
